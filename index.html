<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <base href="/" />

    <title>MultiStream</title>

    <link rel="stylesheet" href="./style.css" />

    <meta name="theme-color" content="#0e0e10" />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="./tom-select.css" />
  </head>

  <body>
    <header class="topbar">
      <div class="logo"><img src="favicon.png" /> MultiStream</div>

      <form id="channelForm" autocomplete="off">
        <input id="channelInput" type="text" placeholder="Add a channel" />

        <button type="submit">
          <i data-lucide="plus"></i>
          <span>Add</span>
        </button>
      </form>

      <div class="toolbar">
        <button id="toggleChat">
          <i data-lucide="message-circle"></i>
          <span>Chat</span>
        </button>

        <button id="rotateStreams" title="Rotate streams">
          <i data-lucide="rotate-cw"></i>
          <span>Rotate</span>
        </button>

        <button id="copyLink">
          <i data-lucide="share-2"></i>
          <span>Share</span>
        </button>

        <button id="clearAll">
          <i data-lucide="trash-2"></i>
          <span>Clear</span>
        </button>
      </div>
    </header>

    <!-- MAIN GRID AREA (must fill screen like MultiStream.am) -->
    <main class="main chat-open">
      <section id="streams" class="streams-grid"></section>
      <div id="emptyState" class="empty-state">First add a channel</div>
    </main>

    <!-- STREAM TEMPLATE -->
    <template id="streamTemplate">
      <article class="stream-card">
        <header class="stream-header">
          <span class="channel-name"></span>

          <form class="rename-form hidden">
            <input class="rename-input" type="text" />
            <button type="submit" class="rename-submit" title="Save">
              <i data-lucide="check"></i>
            </button>
          </form>

          <div class="actions">
            <button class="edit-btn" title="Rename">
              <i data-lucide="pencil"></i>
            </button>

            <button class="fullscreen-btn" title="Fullscreen">
              <i data-lucide="maximize"></i>
            </button>

            <button class="reload-btn" title="Reload">
              <i data-lucide="rotate-cw"></i>
            </button>

            <button class="remove-btn" title="Remove">
              <i data-lucide="x"></i>
            </button>
          </div>
        </header>

        <div class="player-container">
          <iframe
            class="player"
            allow="autoplay; fullscreen"
            allowfullscreen
            frameborder="0"
            scrolling="no"
          ></iframe>
        </div>
      </article>
    </template>

    <div id="globalChat" class="global-chat">
      <div class="global-chat-header">
        <select id="chatChannelSelect">
          <option value="">— Select a channel —</option>
        </select>
      </div>
      <div id="chatFramesContainer" class="chat-frames-container"></div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/tom-select.min.js"></script>
    <script src="/script.js"></script>
  </body>
</html>
